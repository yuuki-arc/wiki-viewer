<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}} — wiki-viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&display=swap"
    />
    <!-- テーマ CSS（id="theme-css" を footer の select から切替える） -->
    <link rel="stylesheet" id="theme-css" href="/assets/css/petal-rose.css" />
    <link rel="stylesheet" href="/assets/css/_base.css" />
    <script>
      (function () {
        var t = localStorage.getItem('wiki-viewer-theme') || 'petal-rose';
        var el = document.getElementById('theme-css');
        if (el) el.href = '/assets/css/' + t + '.css';
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <p class="site-header__wordmark"><a href="/" class="wordmark-link">wiki-viewer</a></p>
      <p class="site-header__tagline">ローカルの Markdown を、ブラウザで。</p>
    </header>
    <div class="wave-divider" aria-hidden="true"></div>

    <div class="page">
      <aside class="sidebar">
        <h3>CONTENTS</h3>
        {{sidebar}}
      </aside>

      <main class="prose">
        {{content}}
      </main>
    </div>

    <footer class="site-footer">
      <span class="credit">made with <span class="heart">✏︎</span> · wiki-viewer</span>
      <label class="theme-picker">
        <span>Theme</span>
        <select id="theme-select">
          <option value="petal-rose">Petal × Rose</option>
          <option value="cream-terracotta">Cream × Terracotta</option>
          <option value="mint-sage">Mint × Sage</option>
          <option value="mist-blue">Mist × Blue</option>
          <option value="lilac-plum">Lilac × Plum</option>
        </select>
      </label>
      <script>
        (function () {
          var KEY = 'wiki-viewer-theme';
          var sel = document.getElementById('theme-select');
          var link = document.getElementById('theme-css');
          if (!sel || !link) return;
          sel.value = localStorage.getItem(KEY) || 'petal-rose';
          sel.addEventListener('change', function (e) {
            var v = e.target.value;
            localStorage.setItem(KEY, v);
            link.href = '/assets/css/' + v + '.css';
          });
        })();
      </script>
    </footer>
  </body>
</html>
